name: Release

# Builds the plugin jar and publishes it to a rolling "latest" GitHub Release
# whenever main is updated, so anyone can download PokeCraft.jar without logging
# in to the Actions tab.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        run: ./gradlew build --no-daemon

      - name: Rename jar
        run: |
          mkdir -p out
          cp build/libs/*.jar out/SurvivalCore.jar

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Auto-built SurvivalCore plugin jar from the latest `main`.
            Drop `SurvivalCore.jar` into your Paper server's `plugins/` folder.
          files: out/SurvivalCore.jar
          make_latest: true
