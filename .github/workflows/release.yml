name: Release mcaddon

# Builds the .mcaddon and publishes it as a GitHub Release automatically.
# The tag/version is read from the behavior-pack folder name (SerpLumen<ver>B),
# so bumping the version and pushing to main creates a new release; pushing
# again at the same version just refreshes the attached file.

on:
  push:
    branches: [main]
    paths:
      - "bp/**"
      - "rp/**"
      - "build.sh"
      - ".github/workflows/release.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build .mcaddon
        run: bash build.sh

      - name: Read version from bp/manifest.json
        id: v
        run: |
          VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('bp/manifest.json','utf8')).header.version.join('.'))")
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "file=$(ls dist/*.mcaddon | head -1)" >> "$GITHUB_OUTPUT"

      - name: Remove stale non-versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # one-time cleanup of the old SurvivalCore-era 'latest' release; no-op once gone
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.v.outputs.ver }}"
          FILE="${{ steps.v.outputs.file }}"
          echo "Releasing $TAG with $FILE"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$FILE" --clobber
          else
            gh release create "$TAG" "$FILE" \
              --title "SerpLumen $TAG" \
              --notes "Automated build of \`$FILE\` from ${{ github.sha }}. Install: put SerpLumen RP above SERP RP in the resource-pack list."
          fi
