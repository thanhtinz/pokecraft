name: Build All Pokemon Blueprints

on:
  workflow_dispatch:
    inputs:
      animations:
        description: "Include animations? (true keeps molang; false = static, much lower CPU)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest Cobblemon jar from Modrinth
        run: |
          URL=$(curl -s "https://api.modrinth.com/v2/project/cobblemon/version?loaders=%5B%22fabric%22%5D" \
            | python3 -c "import sys,json; vs=json.load(sys.stdin); f=[x for x in vs[0]['files'] if x.get('primary')] or vs[0]['files']; print(f[0]['url'])")
          echo "Downloading: $URL"
          curl -L -o cobblemon.jar "$URL"
          ls -lh cobblemon.jar

      - name: Extract and restructure assets
        run: |
          unzip -q cobblemon.jar 'assets/cobblemon/*' -d jar
          mkdir -p pack/textures
          cp -r jar/assets/cobblemon/bedrock/pokemon/models pack/models_tmp
          mkdir -p pack/models && mv pack/models_tmp pack/models/entity
          cp -r jar/assets/cobblemon/bedrock/pokemon/animations pack/animations
          cp -r jar/assets/cobblemon/textures/pokemon pack/textures/entity
          echo "Species dirs: $(ls pack/models/entity | wc -l)"

      - name: Convert to bbmodel blueprints
        run: |
          NOANIM="--no-anim"
          [ "${{ github.event.inputs.animations }}" = "true" ] && NOANIM=""
          echo "animations input: ${{ github.event.inputs.animations }} (NOANIM='$NOANIM')"
          python3 tools/geo2bbmodel_full.py pack -o blueprints $NOANIM
          ls blueprints | wc -l

      - name: Zip blueprints
        run: zip -rq pokemon-blueprints.zip blueprints

      - name: Upload blueprints
        uses: actions/upload-artifact@v4
        with:
          name: pokemon-blueprints
          path: pokemon-blueprints.zip
