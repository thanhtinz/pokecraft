economy:
  starting-balance: 100.0
  currency-symbol: "$"
  # money = pay command minimum
  pay-minimum: 1.0

homes:
  # default max homes; override per player with permission survivalcore.homes.limit.<n>
  default-limit: 3
  teleport-warmup-seconds: 3   # 0 = instant; cancelled if you move/take damage

teleport:
  warmup-seconds: 3            # tpa / warp / home / spawn warmup (0 = instant)
  cooldown-seconds: 5
  # cancel warmup if the player moves a block or takes damage
  cancel-on-move: true
  tpa-expire-seconds: 60

rtp:
  min-radius: 500
  max-radius: 5000
  cooldown-seconds: 60
  # blocks/biomes to avoid landing on
  avoid-water: true

spawn:
  teleport-on-first-join: true
  teleport-on-respawn: false

claims:
  # chunks a player may claim; override per rank with survivalcore.claims.max.<n>
  default-max: 8

auction:
  min-price: 1.0
  max-price: 1000000000.0
  max-listings-per-player: 10

crates:
  # Each crate is opened with a virtual key (see /crate givekey).
  # A reward's "chance" is a weight - higher = more likely. Weights are relative,
  # they do not need to add up to 100. Reward types: item, money, or command.
  vote:
    display: "Vote Crate"
    rewards:
      - chance: 40
        item: DIAMOND
        amount: 3
        name: "&b3 Diamonds"
      - chance: 30
        money: 500.0
        name: "&a$500"
      - chance: 20
        item: EXPERIENCE_BOTTLE
        amount: 16
        name: "&aXP Bottles"
      - chance: 9
        item: DIAMOND_BLOCK
        amount: 2
        name: "&bDiamond Blocks"
      - chance: 1
        item: NETHERITE_INGOT
        amount: 1
        name: "&5Netherite Ingot"
  legendary:
    display: "Legendary Crate"
    rewards:
      - chance: 50
        money: 2000.0
        name: "&a$2000"
      - chance: 30
        item: NETHERITE_INGOT
        amount: 2
        name: "&52 Netherite Ingots"
      - chance: 15
        item: ENCHANTED_GOLDEN_APPLE
        amount: 2
        name: "&6God Apples"
      - chance: 5
        item: NETHERITE_BLOCK
        amount: 1
        name: "&5Netherite Block"

vaults:
  # pages available to everyone; grant more with permission survivalcore.vault.<n>
  default-pages: 1

kits:
  starter:
    display: "&aStarter Kit"
    icon: LEATHER_CHESTPLATE
    cooldown-seconds: 0        # 0 = one-time-ish (no cooldown gate); use a big number for daily
    items:
      - item: STONE_SWORD
        amount: 1
      - item: STONE_PICKAXE
        amount: 1
      - item: COOKED_BEEF
        amount: 16
      - item: OAK_LOG
        amount: 32
  daily:
    display: "&eDaily Kit"
    icon: CHEST
    cooldown-seconds: 86400    # once per day
    money: 250.0
    items:
      - item: GOLDEN_APPLE
        amount: 2
      - item: IRON_INGOT
        amount: 8
  vip:
    display: "&bVIP Kit"
    icon: DIAMOND
    permission: survivalcore.kit.vip
    cooldown-seconds: 43200    # twice per day
    money: 1000.0
    items:
      - item: DIAMOND
        amount: 8
      - item: EXPERIENCE_BOTTLE
        amount: 32

ranks:
  # A linear ladder. /rankup charges the next rank's cost. Prefixes drive chat (Phase 8).
  member:
    display: "&7[Member]"
    cost: 0
  citizen:
    display: "&a[Citizen]"
    cost: 5000.0
  knight:
    display: "&b[Knight]"
    cost: 25000.0
  lord:
    display: "&6[Lord]"
    cost: 100000.0
  king:
    display: "&5[King]"
    cost: 500000.0
