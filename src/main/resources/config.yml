economy:
  starting-balance: 100.0
  currency-symbol: "$"
  # money = pay command minimum
  pay-minimum: 1.0

homes:
  # default max homes; override per player with permission survivalcore.homes.limit.<n>
  default-limit: 3
  teleport-warmup-seconds: 3   # 0 = instant; cancelled if you move/take damage

teleport:
  warmup-seconds: 3            # tpa / warp / home / spawn warmup (0 = instant)
  cooldown-seconds: 5
  # cancel warmup if the player moves a block or takes damage
  cancel-on-move: true
  tpa-expire-seconds: 60

rtp:
  min-radius: 500
  max-radius: 5000
  cooldown-seconds: 60
  # blocks/biomes to avoid landing on
  avoid-water: true

spawn:
  teleport-on-first-join: true
  teleport-on-respawn: false

claims:
  # chunks a player may claim; override per rank with survivalcore.claims.max.<n>
  default-max: 8

auction:
  min-price: 1.0
  max-price: 1000000000.0
  max-listings-per-player: 10

crates:
  # Each crate is opened with a virtual key (see /crate givekey).
  # A reward's "chance" is a weight - higher = more likely. Weights are relative,
  # they do not need to add up to 100. Reward types: item, money, or command.
  vote:
    display: "Vote Crate"
    rewards:
      - chance: 40
        item: DIAMOND
        amount: 3
        name: "&b3 Diamonds"
      - chance: 30
        money: 500.0
        name: "&a$500"
      - chance: 20
        item: EXPERIENCE_BOTTLE
        amount: 16
        name: "&aXP Bottles"
      - chance: 9
        item: DIAMOND_BLOCK
        amount: 2
        name: "&bDiamond Blocks"
      - chance: 1
        item: NETHERITE_INGOT
        amount: 1
        name: "&5Netherite Ingot"
  legendary:
    display: "Legendary Crate"
    rewards:
      - chance: 50
        money: 2000.0
        name: "&a$2000"
      - chance: 30
        item: NETHERITE_INGOT
        amount: 2
        name: "&52 Netherite Ingots"
      - chance: 15
        item: ENCHANTED_GOLDEN_APPLE
        amount: 2
        name: "&6God Apples"
      - chance: 5
        item: NETHERITE_BLOCK
        amount: 1
        name: "&5Netherite Block"

vaults:
  # pages available to everyone; grant more with permission survivalcore.vault.<n>
  default-pages: 1

kits:
  starter:
    display: "&aStarter Kit"
    icon: LEATHER_CHESTPLATE
    cooldown-seconds: 0        # 0 = one-time-ish (no cooldown gate); use a big number for daily
    items:
      - item: STONE_SWORD
        amount: 1
      - item: STONE_PICKAXE
        amount: 1
      - item: COOKED_BEEF
        amount: 16
      - item: OAK_LOG
        amount: 32
  daily:
    display: "&eDaily Kit"
    icon: CHEST
    cooldown-seconds: 86400    # once per day
    money: 250.0
    items:
      - item: GOLDEN_APPLE
        amount: 2
      - item: IRON_INGOT
        amount: 8
  vip:
    display: "&bVIP Kit"
    icon: DIAMOND
    permission: survivalcore.kit.vip
    cooldown-seconds: 43200    # twice per day
    money: 1000.0
    items:
      - item: DIAMOND
        amount: 8
      - item: EXPERIENCE_BOTTLE
        amount: 32

ranks:
  # A linear ladder. /rankup charges the next rank's cost. Prefixes drive chat (Phase 8).
  member:
    display: "&7[Member]"
    cost: 0
  citizen:
    display: "&a[Citizen]"
    cost: 5000.0
  knight:
    display: "&b[Knight]"
    cost: 25000.0
  lord:
    display: "&6[Lord]"
    cost: 100000.0
  king:
    display: "&5[King]"
    cost: 500000.0

jobs:
  max-joined: 3
  list:
    miner:
      display: "&7Miner"
      icon: IRON_PICKAXE
      break:
        COAL_ORE: { money: 4.0, xp: 4.0 }
        DEEPSLATE_COAL_ORE: { money: 4.0, xp: 4.0 }
        IRON_ORE: { money: 8.0, xp: 6.0 }
        DEEPSLATE_IRON_ORE: { money: 8.0, xp: 6.0 }
        GOLD_ORE: { money: 12.0, xp: 8.0 }
        DEEPSLATE_GOLD_ORE: { money: 12.0, xp: 8.0 }
        DIAMOND_ORE: { money: 40.0, xp: 25.0 }
        DEEPSLATE_DIAMOND_ORE: { money: 40.0, xp: 25.0 }
        EMERALD_ORE: { money: 50.0, xp: 30.0 }
        ANCIENT_DEBRIS: { money: 120.0, xp: 60.0 }
    farmer:
      display: "&aFarmer"
      icon: IRON_HOE
      break:
        WHEAT: { money: 3.0, xp: 3.0 }
        CARROTS: { money: 3.0, xp: 3.0 }
        POTATOES: { money: 3.0, xp: 3.0 }
        BEETROOTS: { money: 3.0, xp: 3.0 }
        NETHER_WART: { money: 4.0, xp: 4.0 }
        PUMPKIN: { money: 5.0, xp: 4.0 }
        MELON: { money: 5.0, xp: 4.0 }
        SUGAR_CANE: { money: 2.0, xp: 2.0 }
    woodcutter:
      display: "&6Woodcutter"
      icon: IRON_AXE
      break:
        OAK_LOG: { money: 3.0, xp: 3.0 }
        BIRCH_LOG: { money: 3.0, xp: 3.0 }
        SPRUCE_LOG: { money: 3.0, xp: 3.0 }
        JUNGLE_LOG: { money: 4.0, xp: 4.0 }
        ACACIA_LOG: { money: 4.0, xp: 4.0 }
        DARK_OAK_LOG: { money: 4.0, xp: 4.0 }
        CHERRY_LOG: { money: 5.0, xp: 4.0 }
    hunter:
      display: "&cHunter"
      icon: IRON_SWORD
      kill:
        ZOMBIE: { money: 5.0, xp: 5.0 }
        SKELETON: { money: 5.0, xp: 5.0 }
        SPIDER: { money: 5.0, xp: 5.0 }
        CREEPER: { money: 8.0, xp: 7.0 }
        ENDERMAN: { money: 12.0, xp: 10.0 }
        WITHER_SKELETON: { money: 20.0, xp: 15.0 }
        BLAZE: { money: 15.0, xp: 12.0 }
    fisher:
      display: "&bFisher"
      icon: FISHING_ROD
      fish: { money: 10.0, xp: 8.0 }

daily:
  base-money: 200.0
  per-streak-bonus: 50.0     # extra money per consecutive day
  max-streak: 30
  streak-key:
    every: 7                 # award a crate key every N days (0 = never)
    crate: vote
    amount: 1

vote:
  money: 500.0
  crate: vote                # crate key awarded per vote
  keys: 1
  broadcast: true
  # extra console commands to run on a vote (%player% is replaced)
  commands: []
  # shown by /vote
  links:
    - "https://your-server-list-1.example/vote"
    - "https://your-server-list-2.example/vote"

bounty:
  min-amount: 100.0

giftcode:
  # default reward for codes generated from the admin panel
  default-money: 1000.0
  default-crate: vote
  default-keys: 1
  default-max-uses: 0   # 0 = unlimited total redemptions (still once per player)

chat:
  enabled: true
  # tokens: {rank} {name} {message} ; &-codes and PlaceholderAPI supported in the prefix
  format: "{rank} &f{name}&7: &f{message}"

scoreboard:
  enabled: true
  update-ticks: 40
  title: "&b&lSURVIVAL&f&lCORE"
  # tokens: {name} {rank} {balance} {online} {world} {bounty} ; PlaceholderAPI supported
  lines:
    - "&7&m----------------"
    - "&fPlayer: &a{name}"
    - "&fRank: {rank}"
    - "&fBalance: &e{balance}"
    - "&fOnline: &b{online}"
    - "&7&m----------------"

tab:
  enabled: true
  header:
    - ""
    - "&b&lSurvivalCore"
    - "&7Welcome, &f{name}"
    - ""
  footer:
    - ""
    - "&7Online: &f{online}"
    - ""

hub:
  # The unlosable menu item every player carries. Any material works,
  # e.g. NETHER_STAR, CLOCK, ENDER_EYE, HEART_OF_THE_SEA, BOOK, NAUTILUS_SHELL.
  item: NETHER_STAR
  name: "&b&lᴍᴇɴᴜ"
  glow: true

shop:
  title: "&2&lServer Shop"
  # buy = price to buy `amount`; sell = money for selling `amount`. 0/omitted disables that side.
  items:
    - { item: OAK_LOG, amount: 16, buy: 60.0, sell: 24.0 }
    - { item: COBBLESTONE, amount: 64, buy: 40.0, sell: 12.0 }
    - { item: STONE, amount: 64, buy: 80.0, sell: 24.0 }
    - { item: COAL, amount: 16, buy: 80.0, sell: 32.0 }
    - { item: IRON_INGOT, amount: 8, buy: 200.0, sell: 80.0 }
    - { item: GOLD_INGOT, amount: 8, buy: 240.0, sell: 96.0 }
    - { item: DIAMOND, amount: 4, buy: 600.0, sell: 240.0 }
    - { item: EMERALD, amount: 4, buy: 500.0, sell: 200.0 }
    - { item: WHEAT, amount: 32, buy: 60.0, sell: 24.0 }
    - { item: BREAD, amount: 16, buy: 80.0, sell: 20.0 }
    - { item: COOKED_BEEF, amount: 16, buy: 120.0, sell: 40.0 }
    - { item: TORCH, amount: 32, buy: 40.0, sell: 8.0 }
    - { item: OAK_PLANKS, amount: 32, buy: 40.0, sell: 12.0 }
    - { item: GLASS, amount: 16, buy: 80.0, sell: 24.0 }
    - { item: ENDER_PEARL, amount: 1, buy: 250.0, sell: 80.0 }
    - { item: EXPERIENCE_BOTTLE, amount: 8, buy: 300.0, sell: 0.0 }
