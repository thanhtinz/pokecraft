storage:
  # sqlite | mysql (mysql: fill jdbc url below)
  type: sqlite
  mysql-url: "jdbc:mysql://localhost:3306/pokecraft?user=root&password=secret"

spawning:
  enabled: true
  interval-ticks: 200        # spawn attempt every 10s
  max-wild-per-player: 4
  spawn-radius-min: 12
  spawn-radius-max: 32
  despawn-distance: 64
  despawn-seconds: 300
  water-spawns: true         # Water-type pokemon appear on nearby water surfaces
  time-weather-influence: true  # night favors Ghost/Dark/Poison/Ice; day favors
                                # Normal/Bug/Flying/Grass/Fairy; rain boosts Water/Electric

legendary:
  event-enabled: true
  interval-minutes: 60   # a legendary event is rolled this often
  chance: 0.5            # probability per roll (needs a player online)
  min-level: 50
  max-level: 60
  shiny-rate: 1024       # 1 / N (better odds than wild)

capture:
  # base entity used under ModelEngine models
  base-entity: HUSK
  craftable: true   # allow crafting Poke/Great/Ultra Balls (Master stays uncraftable)
  # throw a Poke Ball into the open (not at a wild) to send out your lead
  # pokemon so it walks with you; the ball is refunded so it isn't wasted
  buddy-throw: true

models:
  # 3D pokemon models via ModelEngine (optional soft-depend). A species uses the
  # ModelEngine blueprint whose id equals the species id (e.g. "pikachu"). Add
  # your own .bbmodel in ModelEngine to give a species a model - no restart, no
  # code. See docs/SETUP.md "Adding your own 3D models".
  enabled: true
  default-scale: 1.0
  preview-seconds: 8
  # bind a species to a blueprint with a different name (species: blueprint)
  overrides: {}

battle:
  exp-multiplier: 1.0
  shiny-rate: 4096           # 1 / N

bedrock:
  # use native Bedrock forms (Cumulus) for battle menu when Floodgate is present
  use-forms: true

economy:
  starting-balance: 500
  # money for winning a wild battle = wild level * this
  wild-win-per-level: 5.0

shop:
  # selling a pokemon pays: pokemon-sell-base + level * pokemon-sell-per-level (x3 if shiny)
  pokemon-sell-base: 200
  pokemon-sell-per-level: 20
  prices:
    poke-ball: 200        # bundle of 8
    great-ball: 600       # bundle of 8
    ultra-ball: 1500      # bundle of 8
    potion: 150
    super-potion: 400
    hyper-potion: 1000
    full-heal: 300
    thunder-stone: 3000
    fire-stone: 3000
    water-stone: 3000
    leaf-stone: 3000
    moon-stone: 3000
    leftovers: 4000
    muscle-band: 3000
    wise-glasses: 3000
    quick-claw: 2500
    lucky-egg: 5000
    everstone: 1000
    focus-band: 3000

pvp:
  win-reward: 250
  turn-timeout-seconds: 45   # auto-pick a move if a player stalls (0 = off)
  max-distance: 50        # blocks between challenger and target

trade:
  max-distance: 50        # blocks between the two traders

marriage:
  exp-bonus: 1.1          # battle exp multiplier while the spouse is online

daycare:
  max-slots: 2
  exp-per-minute: 20
  breed-check-seconds: 60
  breed-chance: 0.15      # per check, when 2 compatible pokemon are deposited
  breed-shiny-rate: 2048  # 1 / N for bred babies (better than wild 1/4096)

egg:
  steps: 300         # blocks the holder must walk for an egg to hatch
  hatch-level: 1     # level the pokemon hatches at

npc:
  trainer-reward-per-level: 10  # money = sum of team levels * this
  trainer-cooldown-minutes: 30

minigame:
  board-reward: 500       # money for beating the AI (or a per-step stake in Higher/Lower)
  board-pvp-reward: 1000  # money the winner of a 2-player board game receives

casino:
  slot-cost: 500

trivia:
  reward: 300
  cooldown-seconds: 60

minimap:
  radius: 100             # blocks scanned for pokemon/player markers
  # give every player a PokeNav compass on join. Right-click it to pop the
  # minimap into the off-hand, where Bedrock/mobile shows it in the screen
  # corner. Right-click again to hide it.
  give-compass: true

farm:
  grow-seconds: 300       # time for a planted berry to ripen
  harvest-money: 150

dungeon:
  waves: 3                # trainer waves before the boss
  base-level: 15
  level-step: 5           # each wave is this much stronger
  boss-level-bonus: 10
  cost: 1000
  cooldown-minutes: 30
  reward: 8000
  boss-species: []        # e.g. [gyarados, dragonite]; empty = random rare

guild:
  create-cost: 5000
  max-members: 20

rank:
  win-points: 25
  loss-points: 15
  reward-1st: 20000
  reward-2nd: 10000
  reward-3rd: 5000

daily:
  base-reward: 200
  streak-bonus: 100       # extra money per consecutive day
  max-streak: 7

fishing:
  enabled: true
  catch-chance: 0.5       # chance a reeled catch is a wild pokemon
  min-level: 5
  max-level: 25

menu:
  # give every player a menu item in the hotbar (right-click/tap to open panel)
  give-item: true
  item-slot: 8

items:
  # dedicated carryable items that open a single panel each (not the shared menu)
  give-pokedex: true   # a Pokedex book - right-click/tap to open the Pokedex
  give-party: true     # a Team bundle - right-click/tap to view your party

ride:
  speed: 0.45
  fly-speed: 0.6
  allow-fly: true         # FLYING-type pokemon can fly with their rider
