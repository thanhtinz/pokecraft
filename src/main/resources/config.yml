economy:
  starting-balance: 100.0
  currency-symbol: "$"
  # money = pay command minimum
  pay-minimum: 1.0

homes:
  # default max homes; override per player with permission survivalcore.homes.limit.<n>
  default-limit: 3
  teleport-warmup-seconds: 3   # 0 = instant; cancelled if you move/take damage

teleport:
  warmup-seconds: 3            # tpa / warp / home / spawn warmup (0 = instant)
  cooldown-seconds: 5
  # cancel warmup if the player moves a block or takes damage
  cancel-on-move: true
  tpa-expire-seconds: 60

rtp:
  min-radius: 500
  max-radius: 5000
  cooldown-seconds: 60
  # blocks/biomes to avoid landing on
  avoid-water: true

spawn:
  teleport-on-first-join: true
  teleport-on-respawn: false

claims:
  # chunks a player may claim; override per rank with survivalcore.claims.max.<n>
  default-max: 8
