storage:
  # sqlite | mysql (mysql: fill jdbc url below)
  type: sqlite
  mysql-url: "jdbc:mysql://localhost:3306/pokecraft?user=root&password=secret"

spawning:
  enabled: true
  interval-ticks: 200        # spawn attempt every 10s
  max-wild-per-player: 4
  spawn-radius-min: 12
  spawn-radius-max: 32
  despawn-distance: 64
  despawn-seconds: 300
  water-spawns: true         # Water-type pokemon appear on nearby water surfaces
  time-weather-influence: true  # night favors Ghost/Dark/Poison/Ice; day favors
                                # Normal/Bug/Flying/Grass/Fairy; rain boosts Water/Electric

legendary:
  event-enabled: true
  interval-minutes: 60   # a legendary event is rolled this often
  chance: 0.5            # probability per roll (needs a player online)
  min-level: 50
  max-level: 60
  shiny-rate: 1024       # 1 / N (better odds than wild)

capture:
  # base entity used under BetterModel models
  base-entity: HUSK

# When you are NOT using a 3D model engine (recommended on Bedrock/mobile, where
# custom models can't render), each pokemon shows as a fitting vanilla mob so
# they aren't all the same husk. by-species overrides by-type; both fall back to
# capture.base-entity. Set models.enabled: false so the base mob stays visible.
mobs:
  by-type:
    NORMAL: PIG
    FIRE: STRIDER
    WATER: AXOLOTL
    GRASS: FROG
    ELECTRIC: RABBIT
    ICE: RABBIT
    FIGHTING: IRON_GOLEM
    POISON: FROG
    GROUND: ARMADILLO
    FLYING: CHICKEN
    PSYCHIC: ALLAY
    BUG: BEE
    ROCK: ARMADILLO
    GHOST: ALLAY
    DRAGON: HORSE
    DARK: CAT
    STEEL: IRON_GOLEM
    FAIRY: ALLAY
  # per-species overrides, e.g.  pikachu: RABBIT
  by-species: {}
  craftable: true   # allow crafting Poke/Great/Ultra Balls (Master stays uncraftable)
  # throw a Poke Ball into the open (not at a wild) to send out your lead
  # pokemon so it walks with you; the ball is refunded so it isn't wasted
  buddy-throw: true

models:
  # 3D pokemon models via BetterModel (optional soft-depend, free & open-source,
  # supports current MC versions). A species uses the BetterModel blueprint whose
  # id equals the species id (e.g. "pikachu"). Add your own .bbmodel in
  # BetterModel to give a species a model - no restart, no code. Note: custom 3D
  # models render on the Java client; Bedrock/mobile players see the mapped
  # vanilla mob (see the "mobs" section). See docs/SETUP.md "Adding your own 3D
  # models".
  enabled: true
  default-scale: 1.0
  preview-seconds: 8
  # keep BetterModel for PC while mobile still shows a mob: when true, the base
  # entity is hidden only from Java players (who see the 3D model), so
  # Bedrock/mobile players keep seeing the mapped vanilla mob instead of an
  # invisible pokemon. Requires enabled: true and BetterModel installed.
  hide-base-java-only: false
  # bind a species to a blueprint with a different name (species: blueprint)
  overrides: {}
  # auto-convert Bedrock models dropped in plugins/PokeCraft/models-import/ into
  # BetterModel blueprints on startup (each <species>.geo.json + .png + optional
  # .animation.json). Requires BetterModel installed.
  auto-import: true
  # only convert models whose file name matches a known species id (skips
  # berries, poke balls, particles, etc. from a full model pack). Set false to
  # convert every .geo.json found.
  import-only-species: true
  # if imported models come out rotated wrong, try [1,1,1] or [-1,-1,-1]
  import-rotation-sign: [-1, -1, 1]
  # extra blueprint names to import even though they aren't species (e.g. balls)
  import-extra: []
  # give the thrown Poke Ball a 3D model (BallType -> blueprint id). The blueprint
  # is auto-imported and applied to the flying ball. Leave blank to keep the item.
  ball-blueprints:
    POKE_BALL: ''
    GREAT_BALL: ''
    ULTRA_BALL: ''
    MASTER_BALL: ''
  # give NPCs a 3D model (NpcType -> blueprint id); applied on spawn + chunk load
  npc-blueprints:
    HEALER: ''
    VENDOR: ''
    TRAINER: ''
    GYM: ''
    DAYCARE: ''
    PC: ''
    TUTOR: ''

movetutor:
  cost: 500                  # PokeDollars to relearn one move

fossils:
  enabled: true
  drop-chance: 0.003         # per stone-type block mined at/below max-y
  max-y: 0                   # only dig up fossils below this height
  revive-level: 20
  # fossil name -> species revived (only species that exist are used)
  types:
    Helix Fossil: omanyte
    Dome Fossil: kabuto
    Old Amber: aerodactyl
    Root Fossil: lileep
    Claw Fossil: anorith
    Skull Fossil: cranidos
    Armor Fossil: shieldon
    Cover Fossil: tirtouga
    Plume Fossil: archen
    Jaw Fossil: tyrunt
    Sail Fossil: amaura

wild:
  # chance a wild pokemon carries a held item (kept if you catch it)
  held-item-chance: 0.05
  held-items: [oran_berry, sitrus_berry, lum_berry, leftovers, focus_band]

chain:
  # catching the same species in a row improves its shiny odds (applies to
  # fishing); catching a different species resets the chain
  enabled: true
  min-shiny-rate: 128        # best (lowest) 1/N the chain can reach

battle:
  exp-multiplier: 1.0
  shiny-rate: 4096           # 1 / N

bedrock:
  # use native Bedrock forms (Cumulus) for battle menu when Floodgate is present
  use-forms: true

economy:
  starting-balance: 500
  # money for winning a wild battle = wild level * this
  wild-win-per-level: 5.0

shop:
  # selling a pokemon pays: pokemon-sell-base + level * pokemon-sell-per-level (x3 if shiny)
  pokemon-sell-base: 200
  pokemon-sell-per-level: 20
  prices:
    poke-ball: 200        # bundle of 8
    great-ball: 600       # bundle of 8
    ultra-ball: 1500      # bundle of 8
    potion: 150
    super-potion: 400
    hyper-potion: 1000
    full-heal: 300
    thunder-stone: 3000
    fire-stone: 3000
    water-stone: 3000
    leaf-stone: 3000
    moon-stone: 3000
    leftovers: 4000
    muscle-band: 3000
    wise-glasses: 3000
    quick-claw: 2500
    lucky-egg: 5000
    everstone: 1000
    focus-band: 3000

pvp:
  win-reward: 250
  turn-timeout-seconds: 45   # auto-pick a move if a player stalls (0 = off)
  max-distance: 50        # blocks between challenger and target

trade:
  max-distance: 50        # blocks between the two traders

marriage:
  exp-bonus: 1.1          # battle exp multiplier while the spouse is online

daycare:
  max-slots: 2
  exp-per-minute: 20
  breed-check-seconds: 60
  breed-chance: 0.15      # per check, when 2 compatible pokemon are deposited
  breed-shiny-rate: 2048  # 1 / N for bred babies (better than wild 1/4096)

egg:
  steps: 300         # blocks the holder must walk for an egg to hatch
  hatch-level: 1     # level the pokemon hatches at

npc:
  trainer-reward-per-level: 10  # money = sum of team levels * this
  trainer-cooldown-minutes: 30

minigame:
  board-reward: 500       # money for beating the AI (or a per-step stake in Higher/Lower)
  board-pvp-reward: 1000  # money the winner of a 2-player board game receives

casino:
  slot-cost: 500

trivia:
  reward: 300
  cooldown-seconds: 60

minimap:
  radius: 100             # blocks scanned for pokemon/player markers
  # The PokeMap opens from the main menu ("Get PokeMap"): a corner minimap on
  # the Java client (off-hand map), or a native radar popup on Bedrock/mobile.

farm:
  grow-seconds: 300       # time for a planted berry to ripen
  harvest-money: 150

dungeon:
  # MythicMobs integration (soft-depend). Build the dungeon with
  # MythicMobs/MythicDungeons; map a mob's internal name to a pokemon here. When
  # a player attacks that mob, a pokemon battle opens instead of a melee fight,
  # and winning kills the mob (its normal death fires, so loot/room progression
  # works). Value is "species" or "species:level".
  mythic:
    enabled: true
    default-level: 25
    battles: {}          # e.g.  DungeonZombie: gengar   |   BossGolem: "steelix:45"
  waves: 3                # trainer waves before the boss
  base-level: 15
  level-step: 5           # each wave is this much stronger
  boss-level-bonus: 10
  cost: 1000
  cooldown-minutes: 30
  reward: 8000
  boss-species: []        # e.g. [gyarados, dragonite]; empty = random rare

guild:
  create-cost: 5000
  max-members: 20

rank:
  win-points: 25
  loss-points: 15
  reward-1st: 20000
  reward-2nd: 10000
  reward-3rd: 5000

daily:
  base-reward: 200
  streak-bonus: 100       # extra money per consecutive day
  max-streak: 7

fishing:
  enabled: true
  catch-chance: 0.5       # chance a reeled catch is a wild pokemon
  min-level: 5
  max-level: 25

menu:
  # give every player a menu item in the hotbar (right-click/tap to open panel)
  give-item: true
  item-slot: 8
  # hide these entries from the main menu (chest + Bedrock form) - handy once you
  # place NPCs for them. Keys: party pc shop daycare duel top dex trade map
  # minigames activities guild rank dungeon balance marry
  hide: []

items:
  # the Pokedex is a carried book (right-click/tap to open); everything else
  # is reached through the main menu panel
  give-pokedex: true

ride:
  speed: 0.45
  fly-speed: 0.6
  allow-fly: true         # FLYING-type pokemon can fly with their rider
