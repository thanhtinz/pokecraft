name: PokeCraft
version: '0.1.0'
main: dev.thanhtin.pokecraft.PokeCraftPlugin
api-version: '1.21'
author: thanhtinz
description: Server-side Pokemon plugin. Geyser/Bedrock compatible, 3D models via BetterModel.
softdepend:
  - BetterModel
  - MythicMobs
  - floodgate
  - Geyser-Spigot
  - Vault
commands:
  poke:
    description: PokeCraft main command
    usage: /poke <party|pc|shop|balance|pay|top|duel|marry|daycare|ride|nickname|release>
    aliases: [pokemon, pc]
permissions:
  pokecraft.admin:
    default: op
