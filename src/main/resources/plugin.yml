name: SurvivalCore
version: '0.1.0'
main: dev.thanhtin.survivalcore.SurvivalCore
api-version: '1.21'
author: thanhtinz
description: All-in-one survival core - economy, homes/warps, land claim, shops, crates and more. Geyser/Bedrock friendly.
softdepend:
  - Vault
  - PlaceholderAPI
  - floodgate
  - Geyser-Spigot
commands:
  balance:
    description: Show your (or another player's) balance
    usage: /balance [player]
    aliases: [bal, money]
  pay:
    description: Send money to a player
    usage: /pay <player> <amount>
  baltop:
    description: Richest players
    aliases: [baltop]
  eco:
    description: Admin economy management
    usage: /eco <give|take|set> <player> <amount>
    permission: survivalcore.admin
  sethome:
    description: Save a home at your location
    usage: /sethome [name]
  home:
    description: Teleport to a home
    usage: /home [name]
  delhome:
    description: Delete a home
    usage: /delhome [name]
  homes:
    description: List your homes
  setwarp:
    description: Create a public warp
    usage: /setwarp <name>
    permission: survivalcore.admin
  delwarp:
    description: Delete a warp
    usage: /delwarp <name>
    permission: survivalcore.admin
  warp:
    description: Teleport to a warp (no args = list)
    usage: /warp [name]
  warps:
    description: List warps
  spawn:
    description: Teleport to spawn
  setspawn:
    description: Set the server spawn
    permission: survivalcore.admin
  tpa:
    description: Request to teleport to a player
    usage: /tpa <player>
  tpahere:
    description: Request a player to teleport to you
    usage: /tpahere <player>
  tpaccept:
    description: Accept a teleport request
    aliases: [tpyes]
  tpdeny:
    description: Deny a teleport request
    aliases: [tpno]
  back:
    description: Return to your last location
  rtp:
    description: Random teleport into the wild
    aliases: [wild]
  claim:
    description: Claim the chunk you're standing in
  unclaim:
    description: Unclaim the chunk you're standing in
  trust:
    description: Let a player build in your claims
    usage: /trust <player>
  untrust:
    description: Revoke a player's build access
    usage: /untrust <player>
  claiminfo:
    description: Who owns this chunk
  claims:
    description: Your claim count and trusted players
  ah:
    description: Open the auction house (or /ah sell <price>, /ah mine)
    usage: /ah [sell <price>|mine]
    aliases: [auction, market]
  sell:
    description: List the held item on the auction house
    usage: /sell <price>
  crate:
    description: Crate info; admins bind crate blocks and give keys
    usage: /crate [givekey <player> <crate> <amount>|setblock <crate>|delblock]
  key:
    description: Crate/key info (alias of /crate)
  pv:
    description: Vault info; admins bind vault blocks (right-click a block to open)
    usage: /pv (or /vault setblock|delblock for admins)
    aliases: [vault, pvault]
  kit:
    description: Claim a kit (no args opens the kit menu)
    usage: /kit [name]
  kits:
    description: Open the kit menu
  rankup:
    description: Advance to the next rank on the ladder
  rank:
    description: Show your current rank and the next one
  jobs:
    description: Join jobs and earn money for your work
    usage: /jobs [join <job>|leave <job>|stats]
    aliases: [job]
  daily:
    description: Claim your daily login reward
  vote:
    description: Show vote links (or /vote test for admins)
  svote:
    description: Grant a vote reward (used by vote listeners/console)
    usage: /svote <player>
    permission: survivalcore.admin
  bounty:
    description: Place a bounty on a player, or list active bounties
    usage: /bounty <player> <amount> | /bounty list
  npc:
    description: Manage roleplay NPCs (admin)
    usage: /npc create <role> [name] | /npc remove | /npc list
    permission: survivalcore.admin
  sc:
    description: Open the SurvivalCore admin settings panel
    aliases: [survivalcore, scadmin]
    permission: survivalcore.admin
  menu:
    description: Open the menu hub (also on your compass)
    aliases: [hub]
permissions:
  survivalcore.admin:
    description: Admin commands
    default: op
  survivalcore.homes.limit.5:
    description: Allow up to 5 homes
    default: true
